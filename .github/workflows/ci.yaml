name: CI

on:
  push:
    branches: [main]
    paths: ['app/**']

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet

      - name: Build and Push
        run: |
          IMAGE=asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/notiflex/api
          TAG=${GITHUB_SHA::7}
          docker build -t ${IMAGE}:${TAG} app/
          docker push ${IMAGE}:${TAG}
          echo "IMAGE_TAG=${TAG}" >> $GITHUB_ENV

      - name: Update manifest
        run: |
          IMAGE=asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/notiflex/api
          TAG=${GITHUB_SHA::7}
          sed -i "s|image: .*notiflex/api:.*|image: ${IMAGE}:${TAG}|" k8s/smb/deployment.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/smb/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update image to ${GITHUB_SHA::7}"
          git push
