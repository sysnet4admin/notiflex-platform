name: CI
on:
  push:
    branches: [main]
    paths: ['app/**']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Test
        working-directory: app
        run: go test ./... -v 2>/dev/null || echo "No tests yet"

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push
        run: |
          VERSION=v$(date +%Y%m%d%H%M%S)
          gcloud builds submit --tag=asia-northeast3-docker.pkg.dev/inlaid-vehicle-484800-n8/notiflex/api:$VERSION app/
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Update manifest
        run: |
          sed -i "s|notiflex/api:.*|notiflex/api:$VERSION|" k8s/smb/deployment.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/smb/deployment.yaml
          git commit -m "ci: update image to $VERSION"
          git push
