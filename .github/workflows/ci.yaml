name: CI

on:
  push:
    branches: [main]
    paths: ['app/**']

env:
  PROJECT_ID: inlaid-vehicle-484800-n8
  REGION: asia-northeast3
  REGISTRY: asia-northeast3-docker.pkg.dev/inlaid-vehicle-484800-n8/notiflex
  IMAGE_NAME: api

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push
        run: |
          IMAGE_URI="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GITHUB_SHA::7}"
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
          docker build -t $IMAGE_URI app/
          docker push $IMAGE_URI

      - name: Update k8s manifest
        run: |
          echo "IMAGE_URI=$IMAGE_URI"
          sed -i "s|image: .*notiflex/api:.*|image: $IMAGE_URI|" k8s/smb/deployment.yaml
          cat k8s/smb/deployment.yaml

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/smb/deployment.yaml
          git diff --cached --quiet || git commit -m "deploy: update image to ${GITHUB_SHA::7}"
          git push
