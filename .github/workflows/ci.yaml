name: CI

on:
  push:
    branches: [main]
    paths: ['app/**']

env:
  REGION: asia-northeast3
  REGISTRY: asia-northeast3-docker.pkg.dev
  IMAGE: asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/notiflex/api

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker
      run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

    - name: Build and Push
      run: |
        TAG=${GITHUB_SHA::7}
        docker build -t ${{ env.IMAGE }}:${TAG} app/
        docker push ${{ env.IMAGE }}:${TAG}
        echo "IMAGE_TAG=${TAG}" >> $GITHUB_ENV
        echo "IMAGE_URI=${{ env.IMAGE }}:${TAG}" >> $GITHUB_ENV

    - name: Update manifests
      run: |
        echo "Updating image to: $IMAGE_URI"
        sed -i "s|image: .*notiflex/api:.*|image: ${IMAGE_URI}|" k8s/smb/rollout.yaml
        cat k8s/smb/rollout.yaml | grep image

    - name: Commit and push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add k8s/smb/rollout.yaml
        git diff --cached --quiet || (git commit -m "ci: update image tag to ${IMAGE_TAG}" && git push)
