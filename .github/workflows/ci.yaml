name: CI

on:
  push:
    branches: [main]
    paths: ['app/**']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and Push
        run: |
          IMAGE_URI=asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/notiflex/api:${{ github.sha }}
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
          gcloud builds submit app/ \
            --tag=$IMAGE_URI \
            --project=${{ secrets.GCP_PROJECT_ID }}

      - name: Update K8s manifest
        run: |
          echo "Updating image to: $IMAGE_URI"
          sed -i "s|image: asia-northeast3-docker.pkg.dev/.*/notiflex/api:.*|image: $IMAGE_URI|" k8s/smb/deployment.yaml

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/smb/deployment.yaml
          git diff --cached --quiet || git commit -m "ci: update image tag to ${GITHUB_SHA::7}"
          git push
