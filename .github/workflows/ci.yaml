name: CI

on:
  push:
    branches: [main]
    paths: ['app/**']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push
        run: |
          TAG=${GITHUB_SHA::7}
          echo "IMAGE_URI=asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/notiflex/api:${TAG}" >> $GITHUB_ENV
          gcloud builds submit app/ \
            --tag=asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/notiflex/api:${TAG} \
            --project=${{ secrets.GCP_PROJECT_ID }}

      - name: Update manifest and push
        run: |
          echo "Updating image to: $IMAGE_URI"
          sed -i "s|image: .*notiflex/api:.*|image: $IMAGE_URI|" k8s/smb/deployment.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/smb/deployment.yaml
          git diff --cached --quiet || git commit -m "ci: update image to ${GITHUB_SHA::7}"
          git push
