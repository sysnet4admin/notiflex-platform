name: CI - Build and Push

on:
  push:
    branches: [main]
    paths: ['app/**']

env:
  REGISTRY: asia-northeast3-docker.pkg.dev
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REPO: notiflex
  IMAGE: api

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Build and Push
        run: |
          IMAGE_URI="${REGISTRY}/${PROJECT_ID}/${REPO}/${IMAGE}:${GITHUB_SHA::7}"
          echo "IMAGE_URI=${IMAGE_URI}" >> $GITHUB_ENV
          docker build -t $IMAGE_URI app/
          docker push $IMAGE_URI

      - name: Update manifest
        run: |
          echo "Updating image to: $IMAGE_URI"
          sed -i "s|image: ${REGISTRY}/${PROJECT_ID}/${REPO}/${IMAGE}:.*|image: ${IMAGE_URI}|" k8s/smb/deployment.yaml

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/smb/deployment.yaml
          git diff --cached --quiet || git commit -m "ci: update image to ${GITHUB_SHA::7}"
          git push
