name: CI

on:
  push:
    branches: [main]
    paths: ['app/**']

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet

      - name: Build and Push
        run: |
          IMAGE=asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/notiflex/api
          TAG=${GITHUB_SHA::7}
          docker build -t ${IMAGE}:${TAG} app/
          docker push ${IMAGE}:${TAG}
          echo "IMAGE_URI=${IMAGE}:${TAG}" >> $GITHUB_ENV
          echo "✅ Pushed ${IMAGE}:${TAG}"

      - name: Update manifest
        run: |
          echo "Updating image to: $IMAGE_URI"
          sed -i "s|image: asia-northeast3-docker.pkg.dev/.*/notiflex/api:.*|image: $IMAGE_URI|" k8s/smb/deployment.yaml
          cat k8s/smb/deployment.yaml | grep image:

      - name: Commit and Push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/smb/deployment.yaml
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "ci: update image tag to ${GITHUB_SHA::7}"
          git push
