name: CI

on:
  push:
    branches: [main]
    paths: ['app/**']

env:
  PROJECT_ID: inlaid-vehicle-484800-n8
  REGION: asia-northeast3
  REPO: notiflex
  IMAGE: api

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Extract version
        run: |
          VERSION=$(grep 'var version' app/main.go | sed 's/.*"\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build and Push
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ env.VERSION }} app/
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ env.VERSION }}

      - name: Update deployment manifest
        run: |
          sed -i "s|${{ env.REPO }}/${{ env.IMAGE }}:.*|${{ env.REPO }}/${{ env.IMAGE }}:${{ env.VERSION }}|" k8s/smb/deployment.yaml

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/smb/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update image to ${{ env.VERSION }}"
          git push
