name: CI
on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/ci.yaml'
permissions:
  contents: write
  id-token: write
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet
      - name: Build and push
        run: |
          TAG=sha-${GITHUB_SHA::7}
          docker build -t "asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/notiflex/api:$TAG" app/
          docker push "asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/notiflex/api:$TAG"
      - name: Update manifest + commit
        run: |
          TAG=sha-${GITHUB_SHA::7}
          sed -i "s|notiflex/api:.*|notiflex/api:$TAG|" k8s/smb/deployment.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/smb/deployment.yaml
          git diff --cached --quiet && exit 0
          git commit -m "ci: image tag $TAG [skip ci]"
          git push
