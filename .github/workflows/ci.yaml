name: CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
  pull_request:
    paths:
      - 'app/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test -v ./...

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          project_id: '${{ secrets.GCP_PROJECT_ID }}'

      - name: Build and push image
        id: build
        run: |
          IMAGE="asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/notiflex/api:sha-${GITHUB_SHA::7}"
          echo "IMAGE_URI=$IMAGE" >> $GITHUB_ENV
          gcloud builds submit app/ --tag="$IMAGE" --project=${{ secrets.GCP_PROJECT_ID }}

      - name: Update Kubernetes manifest
        run: |
          echo "Updating deployment with image: ${{ env.IMAGE_URI }}"
          sed -i "s|image: asia-northeast3-docker.pkg.dev/.*/notiflex/api:.*|image: ${{ env.IMAGE_URI }}|g" k8s/smb/deployment.yaml

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitOps CI Bot'
          git config --global user.email 'ci-bot@users.noreply.github.com'
          git add k8s/smb/deployment.yaml
          git commit -m "CI: Update image tag to sha-${GITHUB_SHA::7}" || echo "No changes to commit"
          git push
