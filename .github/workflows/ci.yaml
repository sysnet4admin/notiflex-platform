name: CI
on:
  push:
    branches: [main]
    paths: ['app/**']

env:
  PROJECT_ID: inlaid-vehicle-484800-n8
  REGION: asia-northeast3
  REGISTRY: asia-northeast3-docker.pkg.dev/inlaid-vehicle-484800-n8/notiflex
  IMAGE_NAME: api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push
        run: |
          IMAGE_URI="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GITHUB_SHA::8}"
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
          docker build -t $IMAGE_URI app/
          docker push $IMAGE_URI

      - name: Update manifest
        run: |
          sed -i "s|image: .*api:.*|image: $IMAGE_URI|" k8s/smb/deployment.yaml
          sed -i "s|image: .*api:.*|image: $IMAGE_URI|" k8s/smb/rollout.yaml 2>/dev/null || true

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add k8s/
          git diff --cached --quiet || (git commit -m "ci: update image to ${GITHUB_SHA::8}" && git push)
