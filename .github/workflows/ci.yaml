name: CI

on:
  push:
    branches: [main]
    paths: ['app/**']

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet

      - name: Build and Push
        run: |
          IMAGE_TAG="${GITHUB_SHA::7}"
          IMAGE_URI="asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/notiflex/api:${IMAGE_TAG}"
          docker build -t "${IMAGE_URI}" app/
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> $GITHUB_ENV

      - name: Update manifest
        run: |
          echo "IMAGE_URI=${IMAGE_URI}"
          sed -i "s|image: asia-northeast3-docker.pkg.dev/.*/notiflex/api:.*|image: ${IMAGE_URI}|" k8s/smb/deployment.yaml
          cat k8s/smb/deployment.yaml | grep image

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/smb/deployment.yaml
          git diff --cached --quiet || (git commit -m "ci: update image to ${IMAGE_URI}" && git push)
