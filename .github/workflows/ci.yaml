name: CI

on:
  push:
    branches: [main]
    paths: ['app/**']

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: [self-hosted, onprem-mac]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Build and push to onprem registry
        id: build
        run: |
          IMAGE=192.168.1.10:30500/notiflex/api
          TAG=sha-$(echo $GITHUB_SHA | cut -c1-7)
          docker build --platform=linux/arm64 -t $IMAGE:$TAG app/
          docker push $IMAGE:$TAG
          echo "image=$IMAGE:$TAG" >> $GITHUB_OUTPUT

      - name: Update manifest image tag
        run: |
          sed -i "s|image: 192.168.1.10:30500/notiflex/api:.*|image: ${{ steps.build.outputs.image }}|" \
            k8s/smb/deployment.yaml

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push manifest
        run: |
          git add k8s/smb/deployment.yaml
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "ci: update image tag to sha-$(echo $GITHUB_SHA | cut -c1-7) [skip ci]"
          git push
