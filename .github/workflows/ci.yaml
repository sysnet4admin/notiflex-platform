name: CI

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/ci.yaml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push image (SHA tag, async)
        run: |
          IMAGE="asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/notiflex/api:sha-${GITHUB_SHA::7}"
          BUILD_ID=$(gcloud builds submit app/ --tag="$IMAGE" --async \
            --project=${{ secrets.GCP_PROJECT_ID }} --format='value(id)')
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_ENV
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "Submitted build $BUILD_ID for image $IMAGE"

      - name: Wait for build to complete
        run: |
          for i in $(seq 1 30); do
            STATUS=$(gcloud builds describe "$BUILD_ID" \
              --project=${{ secrets.GCP_PROJECT_ID }} --format='value(status)')
            echo "[$i] build status: $STATUS"
            case "$STATUS" in
              SUCCESS) echo "Build succeeded."; exit 0 ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED) exit 1 ;;
            esac
            sleep 10
          done
          exit 1

      - name: Update manifest image tag + git push
        run: |
          echo "IMAGE=$IMAGE"
          sed -i "s|notiflex/api:.*|notiflex/api:sha-${GITHUB_SHA::7}|" k8s/smb/rollout.yaml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/smb/rollout.yaml
          if git diff --cached --quiet; then
            echo "No manifest changes."
          else
            git commit -m "chore: update image to sha-${GITHUB_SHA::7} [skip ci]"
            git push
          fi
