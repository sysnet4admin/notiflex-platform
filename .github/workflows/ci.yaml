name: CI
on:
  push:
    branches: [main]
    paths: [app/**]
permissions:
  contents: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
    - run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet
    - name: Build and push
      run: |
        IMAGE="asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/notiflex/api:sha-${GITHUB_SHA::7}"
        docker build -t "$IMAGE" app/ && docker push "$IMAGE"
    - name: Update manifest
      run: |
        IMAGE="asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/notiflex/api:sha-${GITHUB_SHA::7}"
        sed -i "s|image: .*|image: $IMAGE|" k8s/smb/rollout.yaml
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config user.name "github-actions[bot]"
        git add k8s/smb/rollout.yaml
        git commit -m "ci: update image to sha-${GITHUB_SHA::7}" || echo "no changes"
        git push
