name: CI pipeline

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/ci.yaml"

permissions:
  contents: write
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      LEGACY_WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
      LEGACY_WIF_SERVICE_ACCOUNT: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      GCP_WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_WIF_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud (SA Key)
        if: ${{ env.GCP_SA_KEY != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - name: Authenticate to Google Cloud (WIF legacy secrets)
        if: ${{ env.GCP_SA_KEY == '' && env.LEGACY_WIF_PROVIDER != '' && env.LEGACY_WIF_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.LEGACY_WIF_PROVIDER }}
          service_account: ${{ env.LEGACY_WIF_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (WIF GCP secrets)
        if: ${{ env.GCP_SA_KEY == '' && env.LEGACY_WIF_PROVIDER == '' && env.GCP_WIF_PROVIDER != '' && env.GCP_WIF_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WIF_PROVIDER }}
          service_account: ${{ env.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Validate GCP auth inputs
        run: |
          if [ -z "${PROJECT_ID}" ]; then
            echo "GCP_PROJECT_ID secret is required"
            exit 1
          fi

          if [ -n "${GCP_SA_KEY}" ] || { [ -n "${LEGACY_WIF_PROVIDER}" ] && [ -n "${LEGACY_WIF_SERVICE_ACCOUNT}" ]; } || { [ -n "${GCP_WIF_PROVIDER}" ] && [ -n "${GCP_WIF_SERVICE_ACCOUNT}" ]; }; then
            echo "GCP auth input detected"
            exit 0
          fi

          echo "Either GCP_SA_KEY, (WIF_PROVIDER + WIF_SERVICE_ACCOUNT), or (GCP_WORKLOAD_IDENTITY_PROVIDER + GCP_SERVICE_ACCOUNT) is required"
          exit 1

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE="asia-northeast3-docker.pkg.dev/${PROJECT_ID}/notiflex/api:sha-${SHORT_SHA}"
          docker build -t "${IMAGE}" app/
          docker push "${IMAGE}"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_URI=${IMAGE}" >> "$GITHUB_ENV"

      - name: Update deployment image tag
        run: |
          echo "IMAGE_URI=${IMAGE_URI}"
          sed -i "s|^\([[:space:]]*image:[[:space:]]*\).*notiflex/api:.*$|\1${IMAGE_URI}|g" k8s/smb/deployment.yaml
          grep -n "image:" k8s/smb/deployment.yaml

      - name: Commit and push manifest change
        run: |
          if git diff --quiet -- k8s/smb/deployment.yaml; then
            echo "No manifest changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/smb/deployment.yaml
          git commit -m "chore(ci): update image to sha-${SHORT_SHA} [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
