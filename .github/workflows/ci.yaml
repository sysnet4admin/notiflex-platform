name: CI pipeline

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/ci.yaml"

jobs:
  build-and-sync-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Build and push image (SHA tag, async)
        shell: bash
        run: |
          IMAGE_URI="asia-northeast3-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/notiflex/api:sha-${GITHUB_SHA::7}"
          BUILD_ID=$(gcloud builds submit app/ \
            --tag="$IMAGE_URI" \
            --async \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --format="value(id)")

          echo "BUILD_ID=$BUILD_ID" >> "$GITHUB_ENV"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"
          echo "Submitted build id: $BUILD_ID"
          echo "Target image: $IMAGE_URI"

      - name: Wait for build to complete
        shell: bash
        run: |
          for i in $(seq 1 30); do
            STATUS=$(gcloud builds describe "$BUILD_ID" \
              --project="${{ secrets.GCP_PROJECT_ID }}" \
              --format="value(status)")
            echo "[$i/30] build status: $STATUS"

            case "$STATUS" in
              SUCCESS) exit 0 ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED) exit 1 ;;
            esac
            sleep 10
          done

          echo "Timed out waiting for Cloud Build completion."
          exit 1

      - name: Update Kubernetes manifest image
        shell: bash
        run: |
          echo "Using IMAGE_URI=$IMAGE_URI"
          sed -i "s|^\([[:space:]]*image:[[:space:]]*\).*|\1$IMAGE_URI|" k8s/smb/deployment.yaml
          echo "Updated deployment manifest image:"
          grep -n "image:" k8s/smb/deployment.yaml

      - name: Commit and push manifest update
        shell: bash
        run: |
          if git diff --quiet -- k8s/smb/deployment.yaml; then
            echo "No manifest change detected. Skipping commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/smb/deployment.yaml
          git commit -m "ci: update image tag to sha-${GITHUB_SHA::7} [skip ci]"
          git push
