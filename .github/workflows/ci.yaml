name: CI — Build & Push

on:
  push:
    branches: [main]
    paths: ['app/**']

env:
  REGISTRY: asia-northeast3-docker.pkg.dev
  IMAGE: ${{ secrets.GCP_PROJECT_ID }}/notiflex/api

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet

      - name: Build & Push
        run: |
          TAG=${GITHUB_SHA::7}
          docker build -t $REGISTRY/$IMAGE:$TAG app/
          docker push $REGISTRY/$IMAGE:$TAG
          echo "IMAGE_TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Update manifest
        run: |
          TAG=${GITHUB_SHA::7}
          sed -i "s|image: .*notiflex/api:.*|image: $REGISTRY/$IMAGE:$TAG|" k8s/smb/rollout.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/smb/rollout.yaml
          git diff --cached --quiet || git commit -m "ci: update image tag to $TAG"
          git push
