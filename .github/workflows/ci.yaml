name: CI

on:
  push:
    branches: [main]
    paths: ['app/**']

jobs:
  build-and-push:
    # onprem 전용 self-hosted runner (macOS arm64, host docker 사용)
    runs-on: [self-hosted, onprem-mac]
    steps:
      - uses: actions/checkout@v4
      - name: Build and push to onprem registry
        run: |
          IMAGE=192.168.1.10:30500/notiflex/api
          TAG=sha-$(echo $GITHUB_SHA | cut -c1-7)
          docker build --platform=linux/arm64 -t $IMAGE:$TAG app/
          docker push $IMAGE:$TAG
          echo "Built and pushed: $IMAGE:$TAG"
