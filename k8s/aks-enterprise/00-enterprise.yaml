apiVersion: v1
kind: Namespace
metadata:
  name: notiflex-enterprise
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: enterprise-quota
  namespace: notiflex-enterprise
spec:
  hard:
    requests.cpu: "500m"
    requests.memory: "1Gi"
    limits.cpu: "2"
    limits.memory: "4Gi"
    pods: "10"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notiflex-api
  namespace: notiflex-enterprise
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notiflex-api
      tier: enterprise
  template:
    metadata:
      labels:
        app: notiflex-api
        tier: enterprise
    spec:
      nodeSelector:
        workload: api
      containers:
      - name: api
        image: notiflexacr.azurecr.io/notiflex/api:v0.5.3
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: notiflex-api
  namespace: notiflex-enterprise
spec:
  selector:
    app: notiflex-api
    tier: enterprise
  ports:
  - port: 80
    targetPort: 8080
