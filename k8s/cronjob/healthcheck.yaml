apiVersion: batch/v1
kind: CronJob
metadata:
  name: notiflex-healthcheck
  namespace: notiflex
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          nodeSelector:
            cloud.google.com/gke-nodepool: ops-pool
          containers:
          - name: curl
            image: curlimages/curl:8.10.1
            command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "[healthcheck] $(date -Iseconds) probing /health"
              curl -sSf -m 5 http://notiflex-api.notiflex.svc.cluster.local/health
              echo ""
              echo "[healthcheck] $(date -Iseconds) probing /version"
              curl -sSf -m 5 http://notiflex-api.notiflex.svc.cluster.local/version
              echo ""
              echo "[healthcheck] all probes passed"
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                cpu: 100m
                memory: 64Mi
