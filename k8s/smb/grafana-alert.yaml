apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: notiflex-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus
spec:
  groups:
    - name: notiflex
      rules:
        - alert: PodRestart
          expr: increase(kube_pod_container_status_restarts_total{namespace="notiflex"}[5m]) > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} restarted"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} restarted {{ $value }} times in 5 minutes."
