apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: notiflex-alerts
  namespace: notiflex
  labels:
    release: kube-prometheus
spec:
  groups:
    - name: notiflex
      rules:
        - alert: PodRestarting
          expr: increase(kube_pod_container_status_restarts_total{namespace="notiflex"}[5m]) > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} is restarting"
