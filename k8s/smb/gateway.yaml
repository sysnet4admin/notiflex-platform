apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: notiflex-gw
  namespace: notiflex
spec:
  gatewayClassName: gke-l7-global-external-managed
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: notiflex-api
  namespace: notiflex
spec:
  parentRefs:
    - name: notiflex-gw
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: notiflex-api
          port: 80
