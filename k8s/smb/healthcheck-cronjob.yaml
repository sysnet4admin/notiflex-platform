apiVersion: batch/v1
kind: CronJob
metadata:
  name: notiflex-healthcheck
  namespace: notiflex
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector:
            workload: ops
          containers:
          - name: healthcheck
            image: curlimages/curl:latest
            command: ["sh", "-c"]
            args:
            - |
              if curl -sf http://notiflex-api.notiflex.svc.cluster.local/health; then
                echo " — OK"
              else
                echo " — FAIL"
                exit 1
              fi
            resources:
              requests:
                cpu: "10m"
                memory: "16Mi"
              limits:
                cpu: "50m"
                memory: "32Mi"
          restartPolicy: OnFailure
      backoffLimit: 1
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
