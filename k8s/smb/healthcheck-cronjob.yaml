apiVersion: batch/v1
kind: CronJob
metadata:
  name: notiflex-healthcheck
  namespace: notiflex
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector:
            cloud.google.com/gke-nodepool: ops-pool
          containers:
            - name: healthcheck
              image: curlimages/curl:latest
              command:
                - /bin/sh
                - -c
              args:
                - |
                  status_code=$(curl -s -o /tmp/response.txt -w "%{http_code}" http://notiflex-api.notiflex.svc.cluster.local/health)
                  if [ "$status_code" -eq 200 ]; then
                    echo "Health check passed (HTTP 200)"
                    echo -n "Response: "
                    cat /tmp/response.txt
                  else
                    echo "Health check failed (HTTP $status_code)"
                    echo -n "Response: "
                    cat /tmp/response.txt
                    exit 1
                  fi
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 50m
                  memory: 32Mi
          restartPolicy: OnFailure
