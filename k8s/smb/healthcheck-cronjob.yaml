apiVersion: batch/v1
kind: CronJob
metadata:
  name: healthcheck
  namespace: notiflex
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector:
            cloud.google.com/gke-nodepool: ops-pool
          containers:
          - name: healthcheck
            image: curlimages/curl:latest
            command:
            - sh
            - -c
            - |
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://notiflex-api.notiflex.svc.cluster.local/health)
              if [ "$STATUS" = "200" ]; then
                echo "Health check passed (HTTP $STATUS)"
              else
                echo "Health check failed (HTTP $STATUS)"
                exit 1
              fi
            resources:
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                cpu: 50m
                memory: 32Mi
          restartPolicy: OnFailure
