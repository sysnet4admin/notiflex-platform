apiVersion: batch/v1
kind: CronJob
metadata:
  name: notiflex-health-check
  namespace: notiflex
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: health-check
            image: curlimages/curl:latest
            args:
            - -s
            - --fail
            - http://notiflex-api.notiflex.svc.cluster.local/health
            resources:
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                cpu: 50m
                memory: 32Mi
          restartPolicy: OnFailure
          nodeSelector:
            cloud.google.com/gke-nodepool: ops-pool
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
