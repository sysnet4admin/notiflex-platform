apiVersion: v1
kind: ConfigMap
metadata:
  name: notiflex-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  notiflex.json: |
    {
      "dashboard": {
        "title": "Notiflex Overview",
        "uid": "notiflex-overview",
        "panels": [
          {
            "title": "Pod CPU Usage",
            "type": "timeseries",
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
            "targets": [{
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"notiflex\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}"
            }]
          },
          {
            "title": "Pod Memory Usage",
            "type": "timeseries",
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
            "targets": [{
              "expr": "sum(container_memory_working_set_bytes{namespace=\"notiflex\"}) by (pod)",
              "legendFormat": "{{pod}}"
            }]
          },
          {
            "title": "Pod Restarts",
            "type": "stat",
            "gridPos": {"h": 4, "w": 12, "x": 0, "y": 8},
            "targets": [{
              "expr": "sum(kube_pod_container_status_restarts_total{namespace=\"notiflex\"})"
            }]
          },
          {
            "title": "Running Pods",
            "type": "stat",
            "gridPos": {"h": 4, "w": 12, "x": 12, "y": 8},
            "targets": [{
              "expr": "count(kube_pod_status_phase{namespace=\"notiflex\", phase=\"Running\"})"
            }]
          }
        ],
        "schemaVersion": 39,
        "version": 1
      }
    }
