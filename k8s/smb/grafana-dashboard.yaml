apiVersion: v1
kind: ConfigMap
metadata:
  name: notiflex-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  notiflex.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "title": "Pod CPU Usage",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"notiflex\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "title": "Pod Memory Usage",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"notiflex\"}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "title": "HTTP Requests (if instrumented)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"notiflex\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "title": "Pod Restarts",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "sum(kube_pod_container_status_restarts_total{namespace=\"notiflex\"}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "title": "Notiflex API",
      "uid": "notiflex-api"
    }
