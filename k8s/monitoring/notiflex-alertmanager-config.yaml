apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: notiflex-alertmanager-config
  namespace: notiflex
  labels:
    alertmanagerConfig: notiflex
spec:
  route:
    receiver: notiflex-slack
    groupBy:
      - alertname
      - namespace
      - severity
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 2h
    matchers:
      - name: namespace
        value: notiflex
        matchType: "="
  receivers:
    - name: notiflex-slack
      slackConfigs:
        - channel: "#notiflex-alerts"
          sendResolved: true
          title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
          text: "{{ range .Alerts }}{{ .Annotations.summary }}\\n{{ .Annotations.description }}{{ end }}"
          apiURL:
            name: notiflex-alertmanager-slack
            key: webhook-url
