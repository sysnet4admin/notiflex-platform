apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: notiflex-enterprise
  namespace: notiflex-enterprise
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notiflex-enterprise
  template:
    metadata:
      labels:
        app: notiflex-enterprise
    spec:
      nodeSelector:
        cloud.google.com/gke-nodepool: api-pool
      containers:
      - name: api
        image: asia-northeast3-docker.pkg.dev/inlaid-vehicle-484800-n8/notiflex/api:sha-86ffd12
        ports:
        - containerPort: 8080
        env:
        - name: VALKEY_ADDR
          value: valkey-primary.notiflex.svc.cluster.local:6379
        readinessProbe:
          httpGet: { path: /health, port: 8080 }
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet: { path: /health, port: 8080 }
          initialDelaySeconds: 10
          periodSeconds: 30
  strategy:
    canary:
      canaryService: notiflex-enterprise-preview
      stableService: notiflex-enterprise
      steps:
      - setWeight: 50
      - pause: {duration: 20s}
---
apiVersion: v1
kind: Service
metadata:
  name: notiflex-enterprise
  namespace: notiflex-enterprise
spec:
  type: ClusterIP
  selector:
    app: notiflex-enterprise
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: notiflex-enterprise-preview
  namespace: notiflex-enterprise
spec:
  type: ClusterIP
  selector:
    app: notiflex-enterprise
  ports:
  - port: 80
    targetPort: 8080
