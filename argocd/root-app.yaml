apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sysnet4admin/notiflex-platform
    targetRevision: main
    path: argocd
    directory:
      recurse: true
      include: '{smb,monitoring,kafka,tempo}.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
