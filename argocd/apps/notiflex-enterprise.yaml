apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notiflex-enterprise
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/sysnet4admin/notiflex-platform.git
    targetRevision: claude
    path: k8s/enterprise
  destination:
    server: https://kubernetes.default.svc
    namespace: enterprise
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
