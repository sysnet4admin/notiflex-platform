apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notiflex-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sysnet4admin/notiflex-platform.git
    targetRevision: main
    path: k8s/aks
  destination:
    server: https://kubernetes.default.svc
    namespace: notiflex
  syncPolicy:
    automated:
      prune: false  # don't prune, Rollout is managed elsewhere
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
