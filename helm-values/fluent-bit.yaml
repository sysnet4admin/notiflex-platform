# GKE run-52에서 파악한 엣지 케이스 반영:
# - config.outputs는 이 차트에서 렌더링되지 않음
# - 대신 loki.serviceName/servicePath 사용
# - servicePath는 /loki/api/v1/push (최신 Loki API)
# - autoKubernetesLabels=true + memBufLimit 50MB

loki:
  serviceName: loki
  servicePort: 3100
  serviceScheme: http
  servicePath: /loki/api/v1/push

config:
  loglevel: warn
  labels: '{job="fluent-bit"}'
  autoKubernetesLabels: true
  memBufLimit: "50MB"
  bufChunkSize: "256k"
  bufMaxSize: "256k"

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi
