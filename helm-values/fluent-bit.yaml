# Fluent Bit - Loki output
config:
  outputs: |
    [OUTPUT]
        Name        loki
        Match       kube.*
        Host        loki.monitoring.svc.cluster.local
        Port        3100
        Labels      job=fluent-bit
        Auto_Kubernetes_Labels on

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    memory: 128Mi
