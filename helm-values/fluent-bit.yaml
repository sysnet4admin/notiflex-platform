loki:
  serviceName: loki
  servicePort: 3100
  serviceScheme: http
  servicePath: /api/prom/push

config:
  loglevel: info
  k8sLoggingExclude: "Off"
  k8sLoggingParser: "On"
  labels: '{job="fluent-bit"}'
  autoKubernetesLabels: false

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    memory: 128Mi
