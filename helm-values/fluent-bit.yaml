config:
  outputs: |
    [OUTPUT]
        Name        loki
        Match       *
        Host        loki.monitoring.svc.cluster.local
        Port        3100
        Labels      job=fluent-bit
        Auto_Kubernetes_Labels on
resources:
  requests:
    cpu: 5m
    memory: 64Mi
  limits:
    cpu: 50m
    memory: 128Mi
