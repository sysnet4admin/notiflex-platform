deploymentMode: SingleBinary
loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  useTestSchema: true
  storage:
    type: filesystem
singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 5m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0
