deploymentMode: SingleBinary

loki:
  auth_enabled: false
  useTestSchema: true
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
    bucketNames:
      chunks: chunks
      ruler: ruler
      admin: admin

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 10m
      memory: 128Mi

# SingleBinary 모드에서는 나머지 컴포넌트 replica를 0으로 고정
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# 캐시 컴포넌트 비활성화 (소형 실습 클러스터)
chunksCache:
  enabled: false
resultsCache:
  enabled: false

test:
  enabled: false

lokiCanary:
  enabled: false
