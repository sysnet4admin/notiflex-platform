deploymentMode: SingleBinary

loki:
  auth_enabled: false
  useTestSchema: true
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
    bucketNames:
      chunks: chunks
      ruler: ruler
      admin: admin

gateway:
  enabled: true

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 10m
      memory: 128Mi

write:
  replicas: 0
read:
  replicas: 0
backend:
  replicas: 0

test:
  enabled: false
lokiCanary:
  enabled: false

chunksCache:
  enabled: false
resultsCache:
  enabled: false
