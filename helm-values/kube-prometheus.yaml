# kube-prometheus-stack values for e2-medium nodes
prometheus:
  prometheusSpec:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi
    retention: 12h
    storageSpec: {}

grafana:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi

prometheusOperator:
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      memory: 256Mi

kubeStateMetrics:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi

nodeExporter:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
